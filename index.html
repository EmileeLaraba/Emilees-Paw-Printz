 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emilee's PawPrintz - Lab</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --rose: #C2A19B;
      --rose-soft: #EAC9D0;
      --text-dark: #3E2F2B;
      --text-light: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--rose-soft);
      color: var(--text-dark);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4.2rem);
      margin: 0;
    }

    p {
      line-height: 1.6;
      margin-top: 16px;
      max-width: 520px;
    }

    .container {
      width: min(1200px, 90%);
      margin: auto;
    }

    header {
      background: var(--rose);
      padding: 18px 0;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: linear-gradient(
        rgba(194,161,155,0.9),
        rgba(194,161,155,0.9)
      );
    }

    .hero-layout {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .hero-text {
      color: var(--text-light);
    }

    .hero-text p {
      color: rgba(255,255,255,0.95);
    }

    .buttons {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .btn-primary {
      background: white;
      color: black;
    }

    .btn-secondary {
      border: 1px solid white;
      color: white;
    }

    .hero-image img {
      width: 100%;
      max-width: 520px;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .hero-layout {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .hero-text p {
        margin-left: auto;
        margin-right: auto;
      }

      .buttons {
        justify-content: center;
      }

      .hero-image img {
        max-width: 280px;
        margin: auto;
      }
    }
  </style>
</head>

<body>

<header>
  Emilee's PawPrintz (Lab)
</header>

<section class="hero">
  <div class="container">
    <div class="hero-layout">

      <!-- TEXT -->
      <div class="hero-text">
        <h1>Handmade Pet Memorial Keepsakes</h1>

        <p>
          Created with love to honor the pets who will always be part of your heart.
          Custom resin hearts, paw prints, and meaningful memorial pieces made with care.
        </p>

        <div class="buttons">
          <a href="#" class="btn btn-primary">View Keepsakes</a>
          <a href="#" class="btn btn-secondary">Start a Custom Order</a>
        </div>
      </div>

      <!-- IMAGE -->
      <div class="hero-image">
        <img src="assets/images/emilees-pawprintz-hero-ashes-heart-memorial-dusty-rose.jpg"
             alt="Heart-shaped memorial keepsake with ashes in clear resin on dusty rose background">
      </div>

    </div>
  </div>
</section>

</body>
</html>
